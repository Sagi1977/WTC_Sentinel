name: WTC Sentinel Execution
on:
  schedule:
    # מריץ בכל 5 דקות בין 13:00 ל-13:30 UTC (שזה 16:00-16:30 בישראל)
    - cron: '*/5 13 * * 1-5'
    # מריץ בכל 5 דקות בין 14:00 ל-14:20 UTC (שזה 17:00-17:20 בישראל)
    - cron: '*/5 14 * * 1-5'
    # מריץ ב-20:00 UTC (שזה 23:00 בישראל)
    - cron: '0 20 * * 1-5'
  workflow_dispatch:

jobs:
  run-sentinel:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas yfinance requests google-api-python-client google-auth-httplib2 google-auth-oauthlib google-genai

      - name: Run Sentinel Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
